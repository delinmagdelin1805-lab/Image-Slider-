<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Image Slider</title>

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- Slider -->

    <div class="slider-container">

        <!-- Slide 1 -->

        <div class="slide active">

            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop"
                alt="Nature">

        </div>

        <!-- Slide 2 -->

        <div class="slide">

            <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop"
                alt="Mountain">

        </div>

        <!-- Slide 3 -->

        <div class="slide">

            <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop"
                alt="Beach">

        </div>

        <!-- Buttons -->

        <button class="prev">
            ❮
        </button>

        <button class="next">
            ❯
        </button>

    </div>

    <!-- Dots -->

    <div class="dots-container">

        <span class="dot active"></span>

        <span class="dot"></span>

        <span class="dot"></span>

    </div>

    <script src="script.js"></script>

</body>

</html>
